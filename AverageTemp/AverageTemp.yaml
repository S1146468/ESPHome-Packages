substitutions:
    device:
        id: AverageTemp
        name: "Average Temperature"
    config:
        sensor: 
            entityId: sensor.temperature 



globals:
  - id: ${device.id}_var
    type: double
    restore_value: true
    initial_value: "NAN"
    update_interval: 10min

number:
  - platform: template
    id: ${device.id}_seasonal_average_days
    name: "Seasonal Average Time"
    device_id: ${device.id}
    optimistic: true
    icon: mdi:timer-refresh-outline
    mode: "box"
    unit_of_measurement: "days"
    min_value: 0.1
    max_value: 365
    step: 0.1
    restore_value: true
    initial_value: 7

interval:
  - interval: 60s
    then:
      - lambda: |-
          double days = id(${device.id}_seasonal_average_days).state;

          if (isnan(days) || days < 0.1) {
            days = 7.0;
          }
          
          double factor = 1.0 / (days * 24.0 * 60.0);
          
          if(!isnan(id(${device.id}_temp).state)) 
          {
            if(isnan(id(${device.id}_var))) id(${device.id}_var) = id(${device.id}_temp).state;
            id(${device.id}_var) = id(${device.id}_var) * (1.0 - factor) + id(${device.id}_temp).state * factor;
          }


sensor:
  - platform: homeassistant
    id: ${device.id}_temp
    device_id: ${device.id}
    entity_id: ${config.sensor.entityId}
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    id: ${device.id}_output
    name: "Average Temperature"
    device_id: ${device.id}
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    update_interval: 60s
    lambda: |-
      return id(${device.id}_var);