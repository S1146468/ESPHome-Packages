substitutions:
    device:
        id: AverageTemp
        name: "Average Temperature"
    config:
        sensor: 
            entityId: sensor.temperature 



globals:
  - id: ${device.id}_var
    type: double
    restore_value: true
    initial_value: "NAN"
    update_interval: 10min

number:
  - platform: template
    id: ${device.id}_seasonal_average_days
    name: "Seasonal Average Time"
    device_id: ${device.id}
    optimistic: true
    icon: mdi:timer-refresh-outline
    mode: "box"
    unit_of_measurement: "days"
    min_value: 0.1
    max_value: 365
    step: 0.1
    restore_value: true
    initial_value: 3

interval:
  - interval: 60s
    then:
      - lambda: |-
          double days = id(${device.id}_seasonal_average_days).state;
          double temp = id(${device.id}_temp).state;
          double var = id(${device.id}_var);

          if (isnan(days) || days < 0.1) {
            days = 3.0;
          }
          
          if(isnan(temp)) return;

          double factor = 1.0 / (days * 24.0 * 60.0);
                    
          if(isnan(var)) var = temp;
          id(${device.id}_var) = var * (1.0 - factor) + temp * factor;
          


sensor:
  - platform: homeassistant
    id: ${device.id}_temp
    device_id: ${device.id}
    entity_id: ${config.sensor.entityId}
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    id: ${device.id}_output
    name: "Average Temperature"
    device_id: ${device.id}
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    update_interval: 60s
    lambda: |-
      return id(${device.id}_var);